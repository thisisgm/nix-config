name: build

on:
  push:
  pull_request:
  workflow_dispatch: # also makes gitleaks scan the full history

permissions:
  contents: read

jobs:
  darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - run: nix flake check
      - run: nix fmt -- --check
      - run: nix build .#darwinConfigurations.macbookair.system

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
